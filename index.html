<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeteoChile</title>

    <!-- CSS Bootrstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS local -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="body body--home d-flex flex-column min-vh-100 p-2">
    <nav class="navbar navbar-expand-lg nav-weather sticky-top rounded mb-2">
      <div class="container-fluid">
        <a class="btn-home navbar-brand fw-bold tc-accent" href="#"
          ><i class="fa-solid fa-cloud-sun me-2"></i>MeteoChile</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="#vista-home"
                >Detalle</a
              >
            </li>
          </ul>
          <form id="formBusqueda" class="d-flex" role="search">
            <input
              id="inputBusqueda"
              class="nav-weather__input form-control me-2"
              type="search"
              placeholder="Buscar ciudad"
              aria-label="Buscar"
            />
            <button
              id="btnBusqueda"
              class="nav-weather__btn-search btn btn-primary"
              type="submit"
            >
              Buscar
            </button>
          </form>
        </div>
      </div>
    </nav>

    <header
      id="hero-section"
      class="hero-section py-5 px-2 px-md-0 rounded"
    ></header>

    <main class="d-flex flex-column flex-grow-1">
      <section id="vista-home" class="py-4 py-md-5">
        <h2 class="text-center display-5 my-5">
          Seleccione una de las siguientes ciudades
        </h2>
        <div class="container">
          <div id="regiones-container" class="row mt-0 g-4"></div>
        </div>
      </section>

      <section id="vista-detalle" class="detail-view py-5 flex-grow-1 d-none">
        <div class="container">
          <div class="row">
            <div class="col-10 offset-1 col-lg-8 offset-lg-2">
              <button class="btn btn-home btn-outline-light mb-4">
                <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
              </button>

              <article id="detalle-container"></article>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer py-4 rounded">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <p class="fs-6">
              <i class="fa-solid fa-cloud-sun me-2"></i>MeteoChile &copy;2026
            </p>
            <p class="fs-6">Hecho por Sebastián Olate Huenuñir</p>
            <p class="fs-6">
              Sitio web del clima de las regiones de Chile, hecho con Bootstrap,
              SASS y Javascript Vanilla
            </p>
          </div>
        </div>
      </div>
    </footer>

    <!-- JS Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- JS local -->
    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
